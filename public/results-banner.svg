<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF8DC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5611;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bgGradient)"/>
  
  <!-- Top decorative line -->
  <line x1="0" y1="50" x2="1200" y2="50" stroke="#8B5611" stroke-width="3"/>
  
  <!-- Main Title -->
  <text x="600" y="150" font-family="Georgia, serif" font-size="72" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">
    Congratulations
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="220" font-family="Georgia, serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#8B5611">
    Roman Academy Results 2026
  </text>
  
  <!-- Achievement Stats -->
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#D4AF37">
    100%
  </text>
  <text x="300" y="360" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1a1a1a">
    Pass Rate
  </text>
  
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#D4AF37">
    95%ile
  </text>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1a1a1a">
    Avg CET Score
  </text>
  
  <text x="900" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#D4AF37">
    50+
  </text>
  <text x="900" y="360" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1a1a1a">
    Top Scorers
  </text>
  
  <!-- Bottom decorative line -->
  <line x1="0" y1="450" x2="1200" y2="450" stroke="#8B5611" stroke-width="3"/>
  
  <!-- Footer text -->
  <text x="600" y="490" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#8B5611" opacity="0.8">
    Excellence Through Focused Practice and Personal Guidance
  </text>
</svg>